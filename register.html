<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basefren — Create Account</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:   #050F1C;
    --navy2:  #0A1628;
    --navy3:  #0E1F3A;
    --blue:   #0A84FF;
    --blue2:  #3DA2FF;
    --blue3:  #0055CC;
    --green:  #00C48C;
    --red:    #FF4D4D;
    --white:  #E8F0FF;
    --muted:  #6B82A8;
    --border: rgba(10,132,255,0.15);
    --glow:   rgba(10,132,255,0.25);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--navy);
    color: var(--white);
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(10,132,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(10,132,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none; z-index: 0;
  }

  nav {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 40px; border-bottom: 1px solid var(--border);
    background: rgba(5,15,28,0.9); backdrop-filter: blur(16px);
  }

  .nav-logo {
    font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 700;
    color: var(--white); text-decoration: none; display: flex; align-items: center; gap: 8px;
  }

  .nav-dot { width: 8px; height: 8px; background: var(--blue); border-radius: 50%; box-shadow: 0 0 8px var(--blue); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(.85)} }

  .nav-back { font-size: 13px; color: var(--muted); text-decoration: none; display: flex; align-items: center; gap: 6px; transition: color .2s; }
  .nav-back:hover { color: var(--white); }

  #root {
    position: relative; z-index: 1;
    min-height: calc(100vh - 65px);
    display: flex; align-items: center; justify-content: center;
    padding: 40px 24px;
  }

  .boot-fallback {
    text-align: center; color: var(--muted); font-size: 13px;
  }

  /* CARD */
  .auth-card {
    width: 420px; max-width: 100%;
    background: var(--navy2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 36px;
    text-align: center;
  }

  .auth-icon {
    width: 56px; height: 56px; border-radius: 14px;
    background: linear-gradient(135deg, var(--blue3), var(--blue));
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; margin: 0 auto 20px;
  }

  .auth-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 24px; font-weight: 700; letter-spacing: -.5px;
    margin-bottom: 8px;
  }

  .auth-sub {
    font-size: 14px; color: var(--muted);
    line-height: 1.6; margin-bottom: 28px;
  }

  .privy-login-btn {
    width: 100%;
    background: var(--blue); color: #fff;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px; font-weight: 600;
    padding: 14px 24px; border-radius: 12px; border: none;
    cursor: pointer; transition: all .2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .privy-login-btn:hover { background: var(--blue2); box-shadow: 0 0 24px var(--glow); transform: translateY(-1px); }
  .privy-login-btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }

  .auth-divider {
    margin: 20px 0; font-size: 11px; color: var(--muted);
    letter-spacing: .05em; text-transform: uppercase;
  }

  .perk-mini {
    display: flex; align-items: center; gap: 10px;
    text-align: left; padding: 10px 0;
    font-size: 13px; color: var(--muted);
  }

  .perk-mini svg { color: var(--green); flex-shrink: 0; }

  .wallet-result {
    background: var(--navy3);
    border: 1px solid rgba(0,196,140,.25);
    border-radius: 14px;
    padding: 24px;
    text-align: left;
    margin-bottom: 20px;
  }

  .wallet-result-label {
    font-size: 11px; font-weight: 700; color: var(--muted);
    letter-spacing: .08em; text-transform: uppercase; margin-bottom: 8px;
  }

  .wallet-result-addr {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; color: var(--green);
    word-break: break-all; margin-bottom: 12px;
  }

  .wallet-result-meta {
    font-size: 12px; color: var(--muted);
    display: flex; align-items: center; gap: 6px;
  }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .logout-btn {
    width: 100%;
    background: transparent; color: var(--muted);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px; font-weight: 500;
    padding: 10px; border-radius: 10px;
    border: 1px solid var(--border);
    cursor: pointer; transition: all .2s;
  }
  .logout-btn:hover { color: var(--red); border-color: rgba(255,77,77,.3); }

  .continue-btn {
    width: 100%;
    background: var(--blue); color: #fff;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px; font-weight: 600;
    padding: 14px; border-radius: 12px; border: none;
    cursor: pointer; transition: all .2s;
    margin-bottom: 10px;
  }
  .continue-btn:hover { background: var(--blue2); box-shadow: 0 0 24px var(--glow); }

  .error-box {
    background: rgba(255,77,77,.08);
    border: 1px solid rgba(255,77,77,.25);
    border-radius: 10px; padding: 12px 14px;
    font-size: 12px; color: var(--red);
    margin-bottom: 16px; text-align: left;
    line-height: 1.6;
  }

  .error-box code {
    background: rgba(255,255,255,.06);
    padding: 1px 5px; border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo"><span class="nav-dot"></span>Basefren</a>
  <a href="index.html" class="nav-back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Back to home
  </a>
</nav>

<div id="root">
  <div class="boot-fallback">
    <span class="spinner"></span>
    <div style="margin-top:10px">Loading Basefren...</div>
  </div>
</div>

<script>
  // Hard fallback: if the module script below never runs within 10s
  // (e.g. esm.sh blocked, import map unsupported), show a visible error
  // instead of an infinite spinner.
  window.__moduleBooted = false;
  setTimeout(function() {
    if (!window.__moduleBooted) {
      document.getElementById('root').innerHTML =
        '<div class="auth-card">' +
        '<div class="auth-icon">⚠️</div>' +
        '<div class="auth-title">Could not load</div>' +
        '<p class="auth-sub">The page script never started. This usually means your browser blocked the module scripts (ad-blocker / privacy extension) or esm.sh is unreachable from your network.</p>' +
        '<div class="error-box">Try: disable ad-blockers for this site, or try a different network/browser.</div>' +
        '</div>';
    }
  }, 10000);
</script>

<!--
  IMPORT MAP — penting brok, ini yang mastiin React cuma 1 instance
  yang dipakai bareng-bareng sama Privy SDK. Jangan dihapus/diganti urutan.
-->
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react-dom": "https://esm.sh/react-dom@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "@privy-io/react-auth": "https://esm.sh/@privy-io/react-auth@2.13.8?external=react,react-dom"
  }
}
</script>

<script type="module">
  window.__moduleBooted = true;
  import React from 'react';
  import { createRoot } from 'react-dom/client';
  import { PrivyProvider, usePrivy } from '@privy-io/react-auth';

  const { useState, useEffect, createElement: h } = React;

  // ⚠️ App ID Privy Basefren
  const PRIVY_APP_ID = 'cmqjj2lbc00pv0cl9d8t5e7a6';

  function AuthCard() {
    const privy = usePrivy();
    const { ready, authenticated, user, login, logout } = privy;
    const [loading, setLoading] = useState(false);
    const [errMsg, setErrMsg] = useState('');

    const wallet = user?.wallet?.address;

    useEffect(() => {
      if (authenticated) setLoading(false);
    }, [authenticated]);

    async function handleLogin() {
      setErrMsg('');
      setLoading(true);
      try {
        await login();
      } catch (e) {
        setLoading(false);
        setErrMsg('Could not open login. Check your Privy App ID & allowed domains in the Privy dashboard.');
        console.error(e);
      }
    }

    function handleContinue() {
      try {
        localStorage.setItem('basefren_wallet', wallet || '');
        localStorage.setItem('basefren_user_id', user?.id || '');
      } catch(e) {}
      window.location.href = 'feed.html';
    }

    const [stuck, setStuck] = useState(false);
    useEffect(() => {
      const t = setTimeout(() => { if (!ready) setStuck(true); }, 7000);
      return () => clearTimeout(t);
    }, [ready]);

    if (!ready) {
      return h('div', { className: 'auth-card' },
        h('div', { className: 'auth-icon' }, '🔑'),
        h('div', { className: 'auth-title' }, 'Loading...'),
        h('p', { className: 'auth-sub' }, 'Setting up secure connection.'),
        h('span', { className: 'spinner' }),
        stuck ? h('div', { className: 'error-box', style: { marginTop: '20px' } },
          h('strong', null, 'Taking too long?'),
          h('br'),
          'This usually means: ',
          h('br'),
          '1) Your domain isn\'t whitelisted in the Privy dashboard (Settings → Domains), or',
          h('br'),
          '2) The Privy App ID is wrong, or',
          h('br'),
          '3) Network/ad-blocker is blocking esm.sh.',
          h('br'),
          h('br'),
          'Current domain: ',
          h('code', null, window.location.origin)
        ) : null
      );
    }

    if (authenticated && wallet) {
      return h('div', { className: 'auth-card' },
        h('div', { className: 'auth-icon' }, '🎉'),
        h('div', { className: 'auth-title' }, 'Wallet connected!'),
        h('p', { className: 'auth-sub' }, 'Your Base wallet is ready. This address belongs to you.'),
        h('div', { className: 'wallet-result' },
          h('div', { className: 'wallet-result-label' }, 'Your wallet address'),
          h('div', { className: 'wallet-result-addr' }, wallet),
          h('div', { className: 'wallet-result-meta' },
            h('svg', { width: 12, height: 12, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2.5 },
              h('path', { d: 'M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z' })
            ),
            'Secured by Privy · Base network'
          )
        ),
        h('button', { className: 'continue-btn', onClick: handleContinue }, 'Continue to Basefren →'),
        h('button', { className: 'logout-btn', onClick: logout }, 'Sign out')
      );
    }

    return h('div', { className: 'auth-card' },
      h('div', { className: 'auth-icon' }, '🔑'),
      h('div', { className: 'auth-title' }, 'Join Basefren'),
      h('p', { className: 'auth-sub' }, 'Sign up with email, Google, or X. Your Base wallet gets created automatically — no seed phrase needed.'),
      errMsg ? h('div', { className: 'error-box' }, errMsg) : null,
      h('button', { className: 'privy-login-btn', onClick: handleLogin, disabled: loading },
        loading ? h('span', { className: 'spinner' }) : '⚡',
        loading ? 'Connecting...' : 'Sign up / Log in'
      ),
      h('div', { className: 'auth-divider' }, 'What you get'),
      h('div', { className: 'perk-mini' },
        h('svg', { width: 16, height: 16, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2.5 },
          h('polyline', { points: '20 6 9 17 4 12' })
        ),
        'Wallet generated instantly on Base'
      ),
      h('div', { className: 'perk-mini' },
        h('svg', { width: 16, height: 16, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2.5 },
          h('polyline', { points: '20 6 9 17 4 12' })
        ),
        'No extension, no seed phrase'
      ),
      h('div', { className: 'perk-mini' },
        h('svg', { width: 16, height: 16, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2.5 },
          h('polyline', { points: '20 6 9 17 4 12' })
        ),
        'Secured by passkey / social login'
      )
    );
  }

  function App() {
    return h(PrivyProvider, {
      appId: PRIVY_APP_ID,
      config: {
        loginMethods: ['email', 'google', 'twitter'],
        appearance: {
          theme: 'dark',
          accentColor: '#0A84FF',
        },
        embeddedWallets: {
          createOnLogin: 'users-without-wallets',
        },
      }
    }, h(AuthCard));
  }

  try {
    const root = createRoot(document.getElementById('root'));
    root.render(h(App));
  } catch (e) {
    document.getElementById('root').innerHTML =
      '<div class="auth-card"><div class="auth-icon">⚠️</div><div class="auth-title">Setup error</div><p class="auth-sub">Privy failed to load. Check console for details, or verify your App ID in the Privy dashboard.</p></div>';
    console.error('Basefren / Privy boot error:', e);
  }
</script>

</body>
</html>
